<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Gaming Online</title>
  <meta name="description" content="Shopping cart - Gaming Online Retro Arcade Store">
  <link rel="canonical" href="https://gaming-online.shop/cart">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-page-wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }
    .cart-page-title { font-family: 'Press Start 2P', monospace; font-size: clamp(14px, 2.5vw, 20px); color: var(--white); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
    .cart-page-title::before { content: ''; width: 12px; height: 12px; background: var(--lime); display: inline-block; }
    .cart-page-item {
      display: flex; gap: 20px; padding: 20px 0;
      border-bottom: 1px solid var(--navy3);
      align-items: center;
    }
    .cart-page-img { width: 80px; height: 105px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--navy3); }
    .cart-page-info { flex: 1; min-width: 0; }
    .cart-page-title-item { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--white); margin-bottom: 8px; line-height: 1.6; }
    .cart-page-type { font-size: 11px; color: var(--gray); margin-bottom: 10px; }
    .cart-page-price { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--lime); }
    .cart-page-actions { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .cart-summary {
      background: var(--navy2);
      border: 1px solid var(--navy3);
      padding: 24px;
      margin-top: 30px;
    }
    .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--navy3); font-size: 13px; color: var(--gray); }
    .summary-row.total { border-bottom: none; padding-top: 16px; }
    .summary-row.total .label { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--white); }
    .summary-row.total .val { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--lime); }
    .cart-empty-page { text-align: center; padding: 80px 20px; }
    .cart-empty-page .icon { font-size: 64px; opacity: 0.3; margin-bottom: 20px; }
    .cart-empty-page .msg { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--gray); margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div id="navbar-placeholder"></div>

<a href="catalog.html" class="back-btn">← CONTINUE SHOPPING</a>

<div class="cart-page-wrap">
  <div class="cart-page-title">🛒 YOUR CART</div>

  <div id="cart-page-content"></div>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
function renderCartPage() {
  const container = document.getElementById('cart-page-content');
  if (!container) return;

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="cart-empty-page">
        <div class="icon">🛒</div>
        <div class="msg">YOUR CART IS EMPTY</div>
        <a href="catalog.html" class="btn-primary">🎮 BROWSE GAMES</a>
      </div>
    `;
    return;
  }

  const itemsHTML = cart.map(item => {
    const p = PRODUCTS.find(p => p.id === item.id);
    if (!p) return '';
    return `
      <div class="cart-page-item">
        <img class="cart-page-img" src="${p.image}" alt="${p.title}" onerror="this.style.display='none'">
        <div class="cart-page-info">
          <div class="cart-page-title-item">${p.title}</div>
          <div class="cart-page-type">${p.type}</div>
          <div class="cart-page-price">$${(p.price * item.qty).toFixed(2)}</div>
          <div class="cart-page-actions">
            <div class="qty-controls">
              <button class="qty-btn" onclick="updateQtyPage(${p.id}, -1)">−</button>
              <div class="qty-val" id="qty-page-${p.id}">${item.qty}</div>
              <button class="qty-btn" onclick="updateQtyPage(${p.id}, 1)">+</button>
            </div>
            <button onclick="removeFromCartPage(${p.id})" style="background:transparent;border:1px solid var(--gray);color:var(--gray);padding:8px 12px;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:7px;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--magenta)';this.style.color='var(--magenta)'" onmouseout="this.style.borderColor='var(--gray)';this.style.color='var(--gray)'">
              🗑 REMOVE
            </button>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:'Press Start 2P',monospace;font-size:11px;color:var(--lime);">$${(p.price * item.qty).toFixed(2)}</div>
          <div style="font-size:11px;color:var(--gray);margin-top:4px;">$${p.price.toFixed(2)} each</div>
        </div>
      </div>
    `;
  }).join('');

  const subtotal = getCartTotal();
  const shipping = subtotal >= 50 ? 0 : 4.99;
  const total = subtotal + shipping;

  container.innerHTML = `
    ${itemsHTML}
    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal (${getCartCount()} items)</span>
        <span>$${subtotal.toFixed(2)}</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span>${shipping === 0 ? '<span style="color:var(--lime)">FREE</span>' : '$' + shipping.toFixed(2)}</span>
      </div>
      ${subtotal < 50 ? `<div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--yellow);padding:8px 0;">⚡ Add $${(50 - subtotal).toFixed(2)} more for FREE shipping!</div>` : ''}
      <div class="summary-row total">
        <span class="label">TOTAL</span>
        <span class="val">$${total.toFixed(2)}</span>
      </div>
      <button class="btn-checkout" style="margin-top:16px;" onclick="handleCheckout()">⚡ PROCEED TO CHECKOUT</button>
      <div style="text-align:center;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);margin-top:10px;">🔒 SECURE CHECKOUT VIA SHOPIFY</div>
    </div>
  `;
}

function updateQtyPage(id, delta) {
  updateQty(id, delta);
  renderCartPage();
}

function removeFromCartPage(id) {
  removeFromCart(id);
  renderCartPage();
}

// Override saveCart to also re-render cart page
const originalSaveCart = saveCart;

document.addEventListener('DOMContentLoaded', () => {
  renderCartPage();
});
</script>
</body>
</html>
